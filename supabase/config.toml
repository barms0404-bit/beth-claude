# Supabase project config — used by the Supabase CLI.
# Cloud project lives at https://supabase.com/dashboard — link via:
#   supabase link --project-ref <your-project-ref>

project_id = "armstrong-arikat-research"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://research.armstrongarikat.com"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = true
